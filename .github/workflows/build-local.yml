name: Build offline index

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/build-local.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Inline CDN scripts into index-local.html
        run: |
          python3 - <<'PYEOF'
          import re, urllib.request

          with open('index.html', encoding='utf-8') as f:
              html = f.read()

          def inline_script(match):
              url = match.group(1)
              print(f'Fetching {url}')
              with urllib.request.urlopen(url) as r:
                  src = r.read().decode('utf-8')
              return f'<script>{src}</script>'

          # Replace every <script src="https://..."></script> with inlined content
          result = re.sub(
              r'<script src="(https://[^"]+)"></script>',
              inline_script,
              html,
          )

          with open('index-local.html', 'w', encoding='utf-8') as f:
              f.write(result)

          print(f'index-local.html written ({len(result):,} bytes)')
          PYEOF

      - name: Commit index-local.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index-local.html
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: rebuild index-local.html [skip ci]

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push
